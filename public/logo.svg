<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140" width="600" height="140">
  <defs>
    <linearGradient id="brand1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e07070"/>
      <stop offset="40%" stop-color="#d64b5a"/>
      <stop offset="100%" stop-color="#7B1E2D"/>
    </linearGradient>
    <linearGradient id="brand2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0a0a0"/>
      <stop offset="50%" stop-color="#9B2D3E"/>
      <stop offset="100%" stop-color="#5C1420"/>
    </linearGradient>
    <radialGradient id="glowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9B2D3E" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#9B2D3E" stop-opacity="0"/>
    </radialGradient>
    <filter id="edgeGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Mask: cuts Y out of circle -->
    <mask id="yMask">
      <rect x="0" y="0" width="140" height="140" fill="white"/>
      <g stroke="#000" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
        <!-- Left arm -->
        <line x1="60" y1="55" x2="22" y2="14"/>
        <!-- Right arm -->
        <line x1="60" y1="55" x2="98" y2="14"/>
        <!-- Stem -->
        <line x1="60" y1="55" x2="60" y2="106"/>
      </g>
    </mask>

    <style>
      @keyframes glow {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.4; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-2px); }
      }
      @keyframes edgePulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.7; }
      }
      .glow-pulse { animation: glow 3s ease-in-out infinite; transform-origin: center; }
      .edge-pulse { animation: edgePulse 2.5s ease-in-out infinite; }
      .float-slow { animation: float 4s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background ambient glow -->
  <circle cx="70" cy="70" r="62" fill="url(#glowBg)"/>

  <!-- ===== NEGATIVE SPACE Y MARK ===== -->
  <g transform="translate(10, 10)" class="float-slow">

    <!-- Outer decorative ring -->
    <circle cx="60" cy="55" r="51" fill="none" stroke="url(#brand1)" stroke-width="0.5" opacity="0.1"/>

    <!-- Main circle with Y punched out -->
    <circle cx="60" cy="55" r="48" fill="url(#brand1)" mask="url(#yMask)"/>

    <!-- Y edge glow: makes the cutout visible even on dark background -->
    <g stroke="#f0a0a0" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5" class="edge-pulse">
      <line x1="60" y1="55" x2="22" y2="14"/>
      <line x1="60" y1="55" x2="98" y2="14"/>
      <line x1="60" y1="55" x2="60" y2="106"/>
    </g>
    <!-- Secondary wider glow layer -->
    <g stroke="#e07070" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.08">
      <line x1="60" y1="55" x2="22" y2="14"/>
      <line x1="60" y1="55" x2="98" y2="14"/>
      <line x1="60" y1="55" x2="60" y2="106"/>
    </g>

    <!-- Y break-out frame accents -->
    <line x1="22" y1="14" x2="17" y2="9" stroke="#f0a0a0" stroke-width="1" opacity="0.2"/>
    <line x1="98" y1="14" x2="103" y2="9" stroke="#f0a0a0" stroke-width="1" opacity="0.2"/>
    <line x1="60" y1="106" x2="60" y2="112" stroke="#f0a0a0" stroke-width="1" opacity="0.2"/>

    <!-- Glowing endpoint markers -->
    <circle cx="22" cy="14" r="2.5" fill="#f0a0a0" filter="url(#edgeGlow)" opacity="0.7"/>
    <circle cx="98" cy="14" r="2.5" fill="#e07070" filter="url(#edgeGlow)" opacity="0.7"/>
    <circle cx="60" cy="106" r="2.5" fill="#d64b5a" filter="url(#edgeGlow)" opacity="0.7"/>

    <!-- Inner ring glow (subtle) -->
    <circle cx="60" cy="55" r="48" fill="none" stroke="#f0a0a0" stroke-width="1.5" opacity="0.2" mask="url(#yMask)" class="glow-pulse"/>

    <!-- Ambient micro-dots -->
    <circle cx="35" cy="35" r="1" fill="#e07070" opacity="0.15"/>
    <circle cx="85" cy="35" r="1" fill="#e07070" opacity="0.12"/>
    <circle cx="45" cy="80" r="1" fill="#d64b5a" opacity="0.12"/>
    <circle cx="75" cy="80" r="1" fill="#d64b5a" opacity="0.1"/>
  </g>

  <!-- ===== TYPOGRAPHY ===== -->
  <text x="142" y="60" font-family="'Cassannet Plus','Sora','Inter',system-ui,sans-serif" font-size="44" font-weight="700" fill="#f5f5f5" letter-spacing="3.5">LAB</text>
  <text x="248" y="64" font-family="'Cassannet Plus','Sora','Inter',system-ui,sans-serif" font-size="48" font-weight="800" fill="url(#brand1)" letter-spacing="4">Y</text>
  <text x="142" y="94" font-family="'Space Grotesk','Inter',system-ui,sans-serif" font-size="11.5" fill="#777777" letter-spacing="7.5" font-weight="500">INNOVATING INTELLIGENCE</text>
  <line x1="142" y1="111" x2="370" y2="111" stroke="url(#brand1)" stroke-width="1" opacity="0.15"/>
</svg>
