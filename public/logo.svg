<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 140" fill="none" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="ziGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B2D3E"/>
      <stop offset="50%" stop-color="#7B1E2D"/>
      <stop offset="100%" stop-color="#5C1420"/>
    </linearGradient>
    
    <radialGradient id="circleBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8c2232"/>
      <stop offset="70%" stop-color="#5C1420"/>
      <stop offset="100%" stop-color="#3b0a13"/>
    </radialGradient>

    <!-- Glow Filter -->
    <filter id="intenseGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Letter Z -->
  <path 
    d="M 27,30 L 84,30 L 84,44 L 41,76 L 77,76 A 7,7 0 0 1 84,83 A 7,7 0 0 1 77,90 L 20,90 L 20,76 L 63,44 L 27,44 A 7,7 0 0 1 20,37 A 7,7 0 0 1 27,30" 
    fill="url(#ziGrad)" 
  />

  <!-- Letter i -->
  <!-- Stem -->
  <path 
    d="M 96,48 L 110,48 L 110,90 L 103,90 A 7,7 0 0 1 96,83 Z" 
    fill="url(#ziGrad)" 
  />
  <!-- Dot -->
  <rect x="98" y="24" width="12" height="12" rx="3.5" fill="url(#ziGrad)" />

  <!-- Circular Emblem (X) -->
  <g transform="translate(10, 0)">
    <!-- Main circle -->
    <circle cx="165" cy="60" r="42" fill="url(#circleBg)" stroke="#7B1E2D" stroke-width="1.5" />
    
    <!-- Ambient reflections inside circle -->
    <circle cx="165" cy="60" r="39" stroke="#9B2D3E" stroke-width="0.5" opacity="0.4" />
    <circle cx="165" cy="60" r="34" stroke="#ffffff" stroke-width="0.5" opacity="0.15" />
    <circle cx="165" cy="60" r="44" stroke="#9B2D3E" stroke-width="1" opacity="0.3" />

    <!-- Glowing neon X -->
    <g filter="url(#intenseGlow)">
      <!-- Circuit paths -->
      <path d="M 140,27 L 140,35 L 147,42 L 183,78 L 190,85 L 190,93" stroke="#f06277" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.8" />
      <path d="M 190,27 L 190,35 L 183,42 L 147,78 L 140,85 L 140,93" stroke="#f06277" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.8" />
      
      <!-- Core white/pink lines of X -->
      <path d="M 147,42 L 183,78" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
      <path d="M 183,42 L 147,78" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
      
      <!-- White overlay thin line -->
      <path d="M 147,42 L 183,78" stroke="#fff0f2" stroke-width="1" stroke-linecap="round" />
      <path d="M 183,42 L 147,78" stroke="#fff0f2" stroke-width="1" stroke-linecap="round" />
      
      <!-- Nodes -->
      <circle cx="140" cy="27" r="1.5" fill="#ffffff" />
      <circle cx="140" cy="93" r="1.5" fill="#ffffff" />
      <circle cx="190" cy="27" r="1.5" fill="#ffffff" />
      <circle cx="190" cy="93" r="1.5" fill="#ffffff" />
    </g>
  </g>

  <!-- AI SOLUTIONS Text -->
  <text 
    x="110" 
    y="122" 
    font-family="'Space Grotesk','Inter','Arial',sans-serif" 
    font-size="13" 
    font-weight="600" 
    fill="#a3a3a3" 
    letter-spacing="5" 
    text-anchor="middle"
  >
    AI SOLUTIONS
  </text>
</svg>
